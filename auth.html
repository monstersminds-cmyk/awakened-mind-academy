<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Awakened Mind Academy</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="images/AWAKENED_LOGO2.png">
  <style>
    .auth-container{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
    .auth-box{background:var(--bg2);border:1px solid rgba(201,168,76,0.2);border-radius:var(--radius);padding:2.5rem;width:100%;max-width:420px}
    .auth-logo{text-align:center;margin-bottom:2rem}
    .auth-logo img{width:80px;margin:0 auto 1rem}
    .auth-logo h2{font-size:1.3rem;color:var(--gold)}
    .auth-tabs{display:flex;margin-bottom:2rem;border-bottom:1px solid rgba(201,168,76,0.15)}
    .auth-tab{flex:1;padding:0.8rem;text-align:center;cursor:pointer;font-size:0.85rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-dim);border-bottom:2px solid transparent;transition:all 0.2s}
    .auth-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
    .auth-form{display:flex;flex-direction:column;gap:1rem}
    .auth-form.hidden{display:none}
    .auth-message{padding:0.8rem 1rem;border-radius:var(--radius);font-size:0.85rem;display:none;margin-bottom:0.5rem}
    .auth-message.success{background:rgba(201,168,76,0.1);border:1px solid var(--gold);color:var(--gold)}
    .auth-message.error{background:rgba(255,80,80,0.1);border:1px solid #ff5050;color:#ff5050}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Awakened Mind Academy</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="pages/about.html">About</a>
    <a href="pages/services.html">Services</a>
    <a href="pages/contact.html">Contact</a>
  </div>
  <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
</nav>

<div class="auth-container">
  <div class="auth-box">
    <div class="auth-logo">
      <img src="images/AWAKENED_LOGO2.png" alt="Awakened Mind Academy">
      <h2>Welcome Back</h2>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="showTab('login')">Login</div>
      <div class="auth-tab" onclick="showTab('register')">Register</div>
    </div>

    <div class="auth-message" id="auth-message"></div>

    <!-- LOGIN FORM -->
    <form class="auth-form" id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn btn-gold" style="width:100%;">Login</button>
      <p style="text-align:center;margin-top:1rem;font-size:0.85rem;color:var(--text-dim);">Forgot your password? <a href="reset-password.html" style="color:var(--gold);">Reset it here</a></p>
    </form>

    <!-- REGISTER FORM -->
    <form class="auth-form hidden" id="register-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="register-name" placeholder="Your full name" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="register-email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="register-password" placeholder="Create a password" required>
      </div>
      <button type="submit" class="btn btn-gold" style="width:100%;">Create Account</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseClient = window.supabase.createClient(
  'https://ffpppcbegvjskeujlqif.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmcHBwY2JlZ3Zqc2tldWpscWlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODM3MTQsImV4cCI6MjA5Njc1OTcxNH0.FZu3uNtxJ8KeYx-c2d79YC3ThKzC98W4Azaxzsoot2A'
);

function showTab(tab){
  document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f=>f.classList.add('hidden'));
  document.querySelector(`#${tab}-form`).classList.remove('hidden');
  event.target.classList.add('active');
  hideMessage();
}

function showMessage(text, type){
  const msg = document.getElementById('auth-message');
  msg.textContent = text;
  msg.className = `auth-message ${type}`;
  msg.style.display = 'block';
}

function hideMessage(){
  document.getElementById('auth-message').style.display = 'none';
}

document.getElementById('register-form').addEventListener('submit', async(e)=>{
  e.preventDefault();
  const name = document.getElementById('register-name').value;
  const email = document.getElementById('register-email').value;
  const password = document.getElementById('register-password').value;
  const {error} = await supabaseClient.auth.signUp({
    email, password,
    options:{ data:{ full_name: name } }
  });
  if(error) showMessage(error.message, 'error');
  else showMessage('Account created! Check your email to confirm your account.', 'success');
});

document.getElementById('login-form').addEventListener('submit', async(e)=>{
  e.preventDefault();
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const {error} = await supabaseClient.auth.signInWithPassword({ email, password })
  if(error) showMessage(error.message, 'error');
  else window.location.href = 'dashboard.html';
});
</script>
<script src="js/main.js"></script>
</body>
</html>
