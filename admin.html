<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Awakened Mind Academy</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="images/AWAKENED_LOGO2.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    .admin-container{min-height:100vh;padding:7rem 5% 4rem;max-width:900px;margin:0 auto}
    .admin-header{margin-bottom:2.5rem}
    .admin-tabs{display:flex;gap:0.5rem;margin-bottom:2rem;border-bottom:1px solid rgba(201,168,76,0.15);padding-bottom:0}
    .admin-tab{background:none;border:none;color:var(--text-dim);font-family:Inter,sans-serif;font-size:0.9rem;padding:0.6rem 1.2rem;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s}
    .admin-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .admin-form{background:var(--bg2);border:1px solid rgba(201,168,76,0.15);border-radius:var(--radius);padding:2rem;margin-bottom:2rem}
    .admin-form h3{font-size:0.78rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:1.5rem}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    @media(max-width:600px){.form-grid{grid-template-columns:1fr}}
    .form-full{grid-column:1/-1}
    .admin-form .form-group{display:flex;flex-direction:column;gap:0.4rem}
    .admin-form label{font-size:0.78rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-dim)}
    .admin-form input,.admin-form textarea,.admin-form select{background:var(--bg);border:1px solid rgba(201,168,76,0.2);border-radius:var(--radius);padding:0.7rem 1rem;color:var(--text);font-family:Inter,sans-serif;font-size:0.88rem;outline:none;width:100%;box-sizing:border-box}
    .admin-form input:focus,.admin-form textarea:focus{border-color:var(--gold)}
    .admin-form textarea{min-height:100px;resize:vertical}
    .upload-box{border:2px dashed rgba(201,168,76,0.25);border-radius:var(--radius);padding:1.5rem;text-align:center;cursor:pointer;transition:border-color 0.2s;position:relative}
    .upload-box:hover{border-color:var(--gold)}
    .upload-box input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .upload-box p{font-size:0.82rem;color:var(--text-dim);margin:0}
    .upload-box .upload-icon{font-size:2rem;margin-bottom:0.5rem}
    .upload-preview{width:100%;max-height:180px;object-fit:contain;border-radius:var(--radius);margin-top:0.8rem;display:none}
    .admin-message{padding:0.8rem 1rem;border-radius:var(--radius);font-size:0.85rem;display:none;margin-bottom:1rem}
    .admin-message.success{background:rgba(201,168,76,0.1);border:1px solid var(--gold);color:var(--gold)}
    .admin-message.error{background:rgba(255,80,80,0.1);border:1px solid #ff5050;color:#ff5050}
    .books-list{display:flex;flex-direction:column;gap:1rem}
    .book-admin-item{background:var(--bg2);border:1px solid rgba(201,168,76,0.12);border-radius:var(--radius);padding:1.2rem 1.5rem;display:flex;align-items:center;gap:1.2rem;flex-wrap:wrap}
    .book-admin-cover{width:50px;height:70px;object-fit:cover;border-radius:4px;flex-shrink:0;background:var(--bg)}
    .book-admin-info{flex:1}
    .book-admin-title{font-size:0.95rem;font-weight:600;margin-bottom:0.2rem}
    .book-admin-price{font-size:0.8rem;color:var(--gold)}
    .book-admin-actions{display:flex;gap:0.5rem;flex-wrap:wrap}
    .btn-danger{background:rgba(255,80,80,0.1);border:1px solid #ff5050;color:#ff5050;border-radius:var(--radius);padding:0.4rem 0.9rem;font-size:0.78rem;cursor:pointer;font-family:Inter,sans-serif}
    .btn-danger:hover{background:rgba(255,80,80,0.2)}
    .btn-sm{font-size:0.78rem;padding:0.4rem 0.9rem}
    .publish-toggle{font-size:0.75rem;padding:0.3rem 0.7rem;border-radius:20px;border:1px solid rgba(201,168,76,0.3);background:rgba(201,168,76,0.08);color:var(--gold);cursor:pointer;font-family:Inter,sans-serif}
    .publish-toggle.unpublished{border-color:rgba(255,80,80,0.3);background:rgba(255,80,80,0.08);color:#ff5050}
    .empty-state{text-align:center;padding:3rem;color:var(--text-dim);font-size:0.9rem}
    .progress-bar{height:4px;background:rgba(201,168,76,0.1);border-radius:2px;margin-top:0.5rem;display:none}
    .progress-fill{height:100%;background:var(--gold);border-radius:2px;width:0%;transition:width 0.3s}
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Awakened Mind Academy</a>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="books.html">Books</a>
    <a href="admin.html" class="active">Admin</a>
    <button id="logout-btn" class="btn btn-outline" style="font-size:0.8rem;padding:0.5rem 1.2rem;">Logout</button>
  </div>
  <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
</nav>

<div class="admin-container">
  <div class="admin-header">
    <p class="section-eyebrow">Admin Panel</p>
    <h1 class="section-title">Manage Books</h1>
  </div>

  <div id="access-denied" class="hidden" style="text-align:center;padding:4rem 1rem;">
    <h2 style="color:#ff5050;margin-bottom:1rem;">Access Denied</h2>
    <p style="color:var(--text-dim);">This page is for administrators only.</p>
    <a href="dashboard.html" class="btn btn-gold" style="margin-top:1.5rem;display:inline-block;">Back to Dashboard</a>
  </div>

  <div id="admin-content" class="hidden">
    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="add">Add New Book</button>
      <button class="admin-tab" data-tab="manage">Manage Books</button>
    </div>

    <!-- ADD BOOK TAB -->
    <div class="tab-panel active" id="tab-add">
      <div class="admin-message" id="add-message"></div>
      <div class="admin-form">
        <h3>Book Details</h3>
        <div class="form-grid">
          <div class="form-group form-full">
            <label>Book Title</label>
            <input type="text" id="book-title" placeholder="e.g. The Power of the Subconscious Mind">
          </div>
          <div class="form-group">
            <label>Price</label>
            <input type="text" id="book-price" placeholder="e.g. KSh 500" value="KSh 500">
          </div>
          <div class="form-group">
            <label>Published</label>
            <select id="book-published">
              <option value="true">Yes — visible to clients</option>
              <option value="false">No — hidden draft</option>
            </select>
          </div>
          <div class="form-group form-full">
            <label>Synopsis</label>
            <textarea id="book-synopsis" placeholder="Write the book synopsis that hooks the reader..."></textarea>
          </div>
          <div class="form-group form-full">
            <label>Chapter One Preview</label>
            <textarea id="book-preview" placeholder="Paste the first chapter excerpt here..."></textarea>
          </div>
          <div class="form-group">
            <label>Front Cover Image</label>
            <div class="upload-box" id="cover-upload-box">
              <input type="file" id="cover-file" accept="image/*">
              <div class="upload-icon">📖</div>
              <p>Click to upload front cover</p>
              <p style="font-size:0.75rem;margin-top:0.3rem;">JPG, PNG under 5MB</p>
            </div>
            <div class="progress-bar" id="cover-progress"><div class="progress-fill" id="cover-progress-fill"></div></div>
            <img id="cover-preview" class="upload-preview" alt="Cover preview">
          </div>
          <div class="form-group">
            <label>Back Cover Image</label>
            <div class="upload-box" id="backcover-upload-box">
              <input type="file" id="backcover-file" accept="image/*">
              <div class="upload-icon">📚</div>
              <p>Click to upload back cover</p>
              <p style="font-size:0.75rem;margin-top:0.3rem;">JPG, PNG under 5MB</p>
            </div>
            <div class="progress-bar" id="backcover-progress"><div class="progress-fill" id="backcover-progress-fill"></div></div>
            <img id="backcover-preview" class="upload-preview" alt="Back cover preview">
          </div>
        </div>
        <div style="margin-top:1.5rem;">
          <button class="btn btn-gold" id="save-book-btn" style="width:100%;padding:0.9rem;">Upload & Publish Book</button>
        </div>
      </div>
    </div>

    <!-- MANAGE BOOKS TAB -->
    <div class="tab-panel" id="tab-manage">
      <div class="admin-message" id="manage-message"></div>
      <div class="books-list" id="admin-books-list">
        <div class="empty-state">Loading books...</div>
      </div>
    </div>
  </div>
</div>

<script src="js/main.js"></script>
<script>
var currentUser = null;
var coverUrl = null;
var backcoverUrl = null;

function showMessage(containerId, text, type) {
  var msg = document.getElementById(containerId);
  msg.textContent = text;
  msg.className = 'admin-message ' + type;
  msg.style.display = 'block';
  setTimeout(function() { msg.style.display = 'none'; }, 5000);
}

// Auth + admin check
window.addEventListener('load', function() {
  db.auth.getSession().then(function(result) {
    var session = result.data.session;
    if (!session) { window.location.href = 'auth.html'; return; }
    currentUser = session.user;

    db.from('profiles').select('is_admin').eq('id', currentUser.id).then(function(result) {
      var rows = result.data;
      var isAdmin = rows && rows.length > 0 && rows[0].is_admin === true;
      if (!isAdmin) {
        document.getElementById('access-denied').classList.remove('hidden');
        document.getElementById('admin-content').classList.add('hidden');
      } else {
        document.getElementById('access-denied').classList.add('hidden');
        document.getElementById('admin-content').classList.remove('hidden');
        loadAdminBooks();
      }
    });
  });
});
document.getElementById('logout-btn').addEventListener('click', function() {
  db.auth.signOut().then(function() { window.location.href = 'auth.html'; });
});

// Tabs
document.querySelectorAll('.admin-tab').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.admin-tab').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'manage') loadAdminBooks();
  });
});

// Image preview
function setupImagePreview(inputId, previewId) {
  document.getElementById(inputId).addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      var preview = document.getElementById(previewId);
      preview.src = ev.target.result;
      preview.style.display = 'block';
    };
    reader.readAsDataURL(file);
  });
}
setupImagePreview('cover-file', 'cover-preview');
setupImagePreview('backcover-file', 'backcover-preview');

// Upload image to Supabase storage
function uploadImage(file, filename, progressId, fillId) {
  return new Promise(function(resolve, reject) {
    var progress = document.getElementById(progressId);
    var fill = document.getElementById(fillId);
    progress.style.display = 'block';
    fill.style.width = '30%';

    var path = 'covers/' + Date.now() + '_' + filename;
    db.storage.from('book-covers').upload(path, file, { upsert: true }).then(function(result) {
      if (result.error) {
        progress.style.display = 'none';
        reject(result.error);
        return;
      }
      fill.style.width = '100%';
      setTimeout(function() { progress.style.display = 'none'; }, 500);
      var publicUrl = db.storage.from('book-covers').getPublicUrl(path).data.publicUrl;
      resolve(publicUrl);
    });
  });
}

// Save book
document.getElementById('save-book-btn').addEventListener('click', function() {
  var title = document.getElementById('book-title').value.trim();
  var synopsis = document.getElementById('book-synopsis').value.trim();
  var preview = document.getElementById('book-preview').value.trim();
  var price = document.getElementById('book-price').value.trim();
  var published = document.getElementById('book-published').value === 'true';
  var coverFile = document.getElementById('cover-file').files[0];
  var backcoverFile = document.getElementById('backcover-file').files[0];

  if (!title) { showMessage('add-message', 'Please enter a book title.', 'error'); return; }
  if (!synopsis) { showMessage('add-message', 'Please enter a synopsis.', 'error'); return; }
  if (!coverFile) { showMessage('add-message', 'Please upload a front cover image.', 'error'); return; }

  var btn = document.getElementById('save-book-btn');
  btn.textContent = 'Uploading...';
  btn.disabled = true;

  var coverPromise = uploadImage(coverFile, coverFile.name, 'cover-progress', 'cover-progress-fill');
  var backcoverPromise = backcoverFile
    ? uploadImage(backcoverFile, backcoverFile.name, 'backcover-progress', 'backcover-progress-fill')
    : Promise.resolve(null);

  Promise.all([coverPromise, backcoverPromise]).then(function(urls) {
    var coverUrl = urls[0];
    var backcoverUrl = urls[1];

    db.from('books').insert({
      title: title,
      synopsis: synopsis,
      preview: preview,
      price: price,
      cover_url: coverUrl,
      backcover_url: backcoverUrl,
      published: published,
      created_at: new Date().toISOString()
    }).then(function(result) {
      btn.textContent = 'Upload & Publish Book';
      btn.disabled = false;
      if (result.error) {
        showMessage('add-message', 'Error saving book: ' + result.error.message, 'error');
        return;
      }
      showMessage('add-message', 'Book published successfully.', 'success');
      document.getElementById('book-title').value = '';
      document.getElementById('book-synopsis').value = '';
      document.getElementById('book-preview').value = '';
      document.getElementById('book-price').value = 'KSh 500';
      document.getElementById('cover-file').value = '';
      document.getElementById('backcover-file').value = '';
      document.getElementById('cover-preview').style.display = 'none';
      document.getElementById('backcover-preview').style.display = 'none';
    });
  }).catch(function(err) {
    btn.textContent = 'Upload & Publish Book';
    btn.disabled = false;
    showMessage('add-message', 'Upload failed: ' + err.message, 'error');
  });
});

// Load books for manage tab
function loadAdminBooks() {
  db.from('books').select('*').order('created_at', { ascending: false }).then(function(result) {
    var books = result.data || [];
    var container = document.getElementById('admin-books-list');
    if (books.length === 0) {
      container.innerHTML = '<div class="empty-state">No books yet. Add your first book in the Add tab.</div>';
      return;
    }
    container.innerHTML = '';
    books.forEach(function(book) {
      var div = document.createElement('div');
      div.className = 'book-admin-item';
      div.innerHTML =
        '<img class="book-admin-cover" src="' + (book.cover_url || '') + '" alt="' + book.title + '">' +
        '<div class="book-admin-info">' +
          '<div class="book-admin-title">' + book.title + '</div>' +
          '<div class="book-admin-price">' + (book.price || 'KSh 500') + '</div>' +
        '</div>' +
        '<div class="book-admin-actions">' +
          '<button class="publish-toggle ' + (book.published ? '' : 'unpublished') + '" data-id="' + book.id + '" data-published="' + book.published + '">' +
            (book.published ? 'Published' : 'Hidden') +
          '</button>' +
          '<button class="btn-danger delete-btn" data-id="' + book.id + '">Delete</button>' +
        '</div>';
      container.appendChild(div);
    });

    container.querySelectorAll('.publish-toggle').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var newState = btn.dataset.published === 'true' ? false : true;
        db.from('books').update({ published: newState }).eq('id', btn.dataset.id).then(function() {
          loadAdminBooks();
        });
      });
    });

    container.querySelectorAll('.delete-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        if (!confirm('Delete this book permanently? This cannot be undone.')) return;
        db.from('books').delete().eq('id', btn.dataset.id).then(function() {
          loadAdminBooks();
        });
      });
    });
  });
}
</script>
</body>
</html>
