<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lessons — Awakened Mind Academy</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="images/AWAKENED_LOGO2.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    .lessons-container{min-height:100vh;padding:7rem 5% 4rem;max-width:900px;margin:0 auto}
    .lessons-header{margin-bottom:3rem}
    .lessons-list{display:flex;flex-direction:column;gap:2.5rem}
    .lesson-card{background:var(--bg2);border:1px solid rgba(201,168,76,0.12);border-radius:var(--radius);overflow:hidden;transition:border-color 0.2s}
    .lesson-card:hover{border-color:rgba(201,168,76,0.3)}
    .lesson-photo{width:100%;height:260px;overflow:hidden;background:#2a1f1a}
    .lesson-photo img{width:100%;height:100%;object-fit:cover;display:block}
    .lesson-body{padding:2rem}
    .lesson-date{font-size:0.75rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.6rem}
    .lesson-title{font-size:1.3rem;font-weight:800;color:var(--white);margin-bottom:1.2rem;line-height:1.4}
    .lesson-content{font-size:0.92rem;color:var(--text);line-height:1.9;margin-bottom:1.5rem;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
    .lesson-content.expanded{display:block;-webkit-line-clamp:unset}
    .read-more-btn{background:none;border:none;color:var(--gold);font-size:0.85rem;cursor:pointer;padding:0;font-family:Inter,sans-serif;margin-bottom:1.5rem;display:block}
    .reactions-bar{display:flex;gap:0.8rem;margin-bottom:1.2rem;flex-wrap:wrap}
    .reaction-btn{background:var(--bg);border:1px solid rgba(201,168,76,0.15);border-radius:20px;padding:0.35rem 0.9rem;font-size:0.82rem;cursor:pointer;display:flex;align-items:center;gap:0.4rem;transition:all 0.2s;font-family:Inter,sans-serif;color:var(--text)}
    .reaction-btn:hover{border-color:var(--gold)}
    .reaction-btn.active{background:rgba(201,168,76,0.12);border-color:var(--gold);color:var(--gold)}
    .reaction-count{font-size:0.78rem;color:var(--text-dim)}
    .comments-section{border-top:1px solid rgba(201,168,76,0.08);padding-top:1.2rem;margin-top:0.5rem}
    .comments-toggle{background:none;border:none;color:var(--text-dim);font-size:0.82rem;cursor:pointer;font-family:Inter,sans-serif;margin-bottom:1rem;padding:0}
    .comments-toggle:hover{color:var(--gold)}
    .comments-list{display:flex;flex-direction:column;gap:0.8rem;margin-bottom:1rem}
    .comment-item{background:var(--bg);border-radius:var(--radius);padding:0.8rem 1rem}
    .comment-author{font-size:0.75rem;font-weight:700;color:var(--gold);margin-bottom:0.3rem}
    .comment-text{font-size:0.85rem;color:var(--text);line-height:1.6}
    .comment-time{font-size:0.72rem;color:var(--text-dim);margin-top:0.3rem}
    .comment-input-row{display:flex;gap:0.6rem}
    .comment-input-row input{flex:1;background:var(--bg);border:1px solid rgba(201,168,76,0.2);border-radius:var(--radius);padding:0.6rem 1rem;color:var(--text);font-family:Inter,sans-serif;font-size:0.85rem;outline:none}
    .comment-input-row input:focus{border-color:var(--gold)}
    .comment-input-row button{background:var(--gold);border:none;border-radius:var(--radius);padding:0.6rem 1rem;color:#1c1210;font-weight:700;font-size:0.82rem;cursor:pointer;white-space:nowrap}
    .empty-state{text-align:center;padding:4rem 1rem;color:var(--text-dim)}
    .hidden{display:none}
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Awakened Mind Academy</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="lessons.html" class="active">Lessons</a>
    <a href="events.html">Events</a>
    <button id="logout-btn" class="btn btn-outline" style="font-size:0.8rem;padding:0.5rem 1.2rem;">Logout</button>
  </div>
  <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
</nav>

<div class="lessons-container">
  <div class="lessons-header">
    <p class="section-eyebrow">Professor Walter Kungu</p>
    <h1 class="section-title">Lessons</h1>
    <p style="color:var(--text-dim);font-size:0.95rem;max-width:600px;margin-top:0.8rem;">Deep written lessons on psychology, discipline, and mental transformation. Read, react, and join the conversation.</p>
  </div>
  <div class="lessons-list" id="lessons-list">
    <div class="empty-state">Loading lessons...</div>
  </div>
</div>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="dashboard.html" class="bottom-nav-item"><span>🏠</span><span>Home</span></a>
    <a href="habits.html" class="bottom-nav-item"><span>⚙️</span><span>Habits</span></a>
    <a href="lessons.html" class="bottom-nav-item active"><span>📝</span><span>Lessons</span></a>
    <a href="events.html" class="bottom-nav-item"><span>🗓️</span><span>Events</span></a>
    <a href="profile.html" class="bottom-nav-item"><span>👤</span><span>Profile</span></a>
  </div>
</nav>

<script src="js/main.js"></script>
<script>
var currentUser = null;
var allLessons = [];
var REACTIONS = [
  { key: 'like', emoji: '👍', label: 'Like' },
  { key: 'insightful', emoji: '💡', label: 'Insightful' },
  { key: 'mindblow', emoji: '🤯', label: 'Mind-Blown' },
  { key: 'fire', emoji: '🔥', label: 'Fire' }
];

db.auth.getSession().then(function(result) {
  if (!result.data.session) { window.location.href = 'auth.html'; return; }
  currentUser = result.data.session.user;
  loadLessons();
});

document.getElementById('logout-btn').addEventListener('click', function() {
  db.auth.signOut().then(function() { window.location.href = 'auth.html'; });
});

function formatDate(str) {
  var d = new Date(str);
  return d.toLocaleDateString('en-KE', { year: 'numeric', month: 'long', day: 'numeric' });
}

function loadLessons() {
  db.from('lessons').select('*').eq('published', true).order('created_at', { ascending: false }).then(function(result) {
    allLessons = result.data || [];
    if (allLessons.length === 0) {
      document.getElementById('lessons-list').innerHTML = '<div class="empty-state">No lessons published yet. Check back soon.</div>';
      return;
    }
    renderLessons();
  });
}

function renderLessons() {
  var container = document.getElementById('lessons-list');
  container.innerHTML = '';
  allLessons.forEach(function(lesson) {
    var card = document.createElement('div');
    card.className = 'lesson-card';
    card.id = 'lesson-' + lesson.id;
    var photoHtml = lesson.photo_url
      ? '<div class="lesson-photo"><img src="' + lesson.photo_url + '" alt="' + lesson.title + '"></div>'
      : '';
    card.innerHTML =
      photoHtml +
      '<div class="lesson-body">' +
        '<div class="lesson-date">' + formatDate(lesson.created_at) + '</div>' +
        '<div class="lesson-title">' + lesson.title + '</div>' +
        '<div class="lesson-content" id="content-' + lesson.id + '">' + (lesson.content || '') + '</div>' +
        '<button class="read-more-btn" id="readmore-' + lesson.id + '">Read more →</button>' +
        '<div class="reactions-bar" id="reactions-' + lesson.id + '"></div>' +
        '<div class="comments-section">' +
          '<button class="comments-toggle" id="comments-toggle-' + lesson.id + '">💬 Show comments</button>' +
          '<div class="hidden" id="comments-area-' + lesson.id + '">' +
            '<div class="comments-list" id="comments-list-' + lesson.id + '"></div>' +
            '<div class="comment-input-row">' +
              '<input type="text" id="comment-input-' + lesson.id + '" placeholder="Write a comment...">' +
              '<button id="comment-btn-' + lesson.id + '">Post</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    container.appendChild(card);
    setupReadMore(lesson.id);
    loadReactions(lesson.id);
    setupComments(lesson.id);
  });
}

function setupReadMore(id) {
  var btn = document.getElementById('readmore-' + id);
  var content = document.getElementById('content-' + id);
  var expanded = false;
  btn.addEventListener('click', function() {
    expanded = !expanded;
    if (expanded) { content.classList.add('expanded'); btn.textContent = 'Show less ↑'; }
    else { content.classList.remove('expanded'); btn.textContent = 'Read more →'; }
  });
}

function loadReactions(lessonId) {
  db.from('lesson_reactions').select('reaction, user_id').eq('lesson_id', lessonId).then(function(result) {
    var reactions = result.data || [];
    var container = document.getElementById('reactions-' + lessonId);
    container.innerHTML = '';
    REACTIONS.forEach(function(r) {
      var count = reactions.filter(function(rx) { return rx.reaction === r.key; }).length;
      var myReaction = reactions.find(function(rx) { return rx.user_id === currentUser.id && rx.reaction === r.key; });
      var btn = document.createElement('button');
      btn.className = 'reaction-btn' + (myReaction ? ' active' : '');
      btn.innerHTML = r.emoji + ' <span>' + r.label + '</span> <span class="reaction-count">' + (count > 0 ? count : '') + '</span>';
      btn.addEventListener('click', function() { toggleReaction(lessonId, r.key, !!myReaction); });
      container.appendChild(btn);
    });
  });
}

function toggleReaction(lessonId, reaction, alreadyReacted) {
  if (alreadyReacted) {
    db.from('lesson_reactions').delete().eq('lesson_id', lessonId).eq('user_id', currentUser.id).eq('reaction', reaction).then(function() { loadReactions(lessonId); });
  } else {
    db.from('lesson_reactions').upsert({ lesson_id: lessonId, user_id: currentUser.id, reaction: reaction }).then(function() { loadReactions(lessonId); });
  }
}

function setupComments(lessonId) {
  var toggle = document.getElementById('comments-toggle-' + lessonId);
  var area = document.getElementById('comments-area-' + lessonId);
  var open = false;
  toggle.addEventListener('click', function() {
    open = !open;
    if (open) { area.classList.remove('hidden'); toggle.textContent = '💬 Hide comments'; loadComments(lessonId); }
    else { area.classList.add('hidden'); toggle.textContent = '💬 Show comments'; }
  });
  document.getElementById('comment-btn-' + lessonId).addEventListener('click', function() { postComment(lessonId); });
  document.getElementById('comment-input-' + lessonId).addEventListener('keydown', function(e) { if (e.key === 'Enter') postComment(lessonId); });
}

function loadComments(lessonId) {
  db.from('lesson_comments').select('*').eq('lesson_id', lessonId).order('created_at', { ascending: true }).then(function(result) {
    var comments = result.data || [];
    var list = document.getElementById('comments-list-' + lessonId);
    if (comments.length === 0) {
      list.innerHTML = '<div style="color:var(--text-dim);font-size:0.82rem;padding:0.5rem 0;">No comments yet. Be the first.</div>';
      return;
    }
    list.innerHTML = '';
    comments.forEach(function(c) {
      var div = document.createElement('div');
      div.className = 'comment-item';
      div.innerHTML = '<div class="comment-author">Member</div><div class="comment-text">' + c.content + '</div><div class="comment-time">' + formatDate(c.created_at) + '</div>';
      list.appendChild(div);
    });
  });
}

function postComment(lessonId) {
  var input = document.getElementById('comment-input-' + lessonId);
  var text = input.value.trim();
  if (!text) return;
  db.from('lesson_comments').insert({ lesson_id: lessonId, user_id: currentUser.id, content: text, created_at: new Date().toISOString() }).then(function(result) {
    if (!result.error) { input.value = ''; loadComments(lessonId); }
  });
}
</script>
</body>
</html>
