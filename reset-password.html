<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Awakened Mind Academy</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="images/AWAKENED_LOGO2.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    .auth-container{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
    .auth-box{background:var(--bg2);border:1px solid rgba(201,168,76,0.2);border-radius:var(--radius);padding:2.5rem;width:100%;max-width:420px}
    .auth-logo{text-align:center;margin-bottom:2rem}
    .auth-logo img{width:80px;margin:0 auto 1rem}
    .auth-logo h2{font-size:1.3rem;color:var(--gold)}
    .auth-form{display:flex;flex-direction:column;gap:1rem}
    .auth-message{padding:0.8rem 1rem;border-radius:var(--radius);font-size:0.85rem;display:none;margin-bottom:0.5rem}
    .auth-message.success{background:rgba(201,168,76,0.1);border:1px solid var(--gold);color:var(--gold)}
    .auth-message.error{background:rgba(255,80,80,0.1);border:1px solid #ff5050;color:#ff5050}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Awakened Mind Academy</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="auth.html" class="btn btn-gold">Login / Register</a>
  </div>
  <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
</nav>

<div class="auth-container">
  <div class="auth-box">
    <div class="auth-logo">
      <img src="images/AWAKENED_LOGO2.png" alt="Awakened Mind Academy">
      <h2>Reset Password</h2>
    </div>

    <div class="auth-message" id="auth-message"></div>

    <!-- REQUEST RESET FORM -->
    <form class="auth-form" id="request-form">
      <p style="color:var(--text-dim);font-size:0.9rem;margin-bottom:0.5rem;">Enter your email address and we will send you a link to reset your password.</p>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reset-email" placeholder="your@email.com" required>
      </div>
      <button type="submit" class="btn btn-gold" style="width:100%;">Send Reset Link</button>
      <p style="text-align:center;font-size:0.85rem;color:var(--text-dim);">Remember your password? <a href="auth.html" style="color:var(--gold);">Login here</a></p>
    </form>

    <!-- NEW PASSWORD FORM -->
    <form class="auth-form" id="new-password-form" style="display:none;">
      <p style="color:var(--text-dim);font-size:0.9rem;margin-bottom:0.5rem;">Enter your new password below.</p>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="new-password" placeholder="Create new password" required>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Confirm new password" required>
      </div>
      <button type="submit" class="btn btn-gold" style="width:100%;">Update Password</button>
    </form>
  </div>
</div>

<script>
var db = window.supabase.createClient(
  'https://ffpppcbegvjskeujlqif.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmcHBwY2JlZ3Zqc2tldWpscWlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODM3MTQsImV4cCI6MjA5Njc1OTcxNH0.FZu3uNtxJ8KeYx-c2d79YC3ThKzC98W4Azaxzsoot2A'
);

function showMessage(text, type) {
  var msg = document.getElementById('auth-message');
  msg.textContent = text;
  msg.className = 'auth-message ' + type;
  msg.style.display = 'block';
}

db.auth.onAuthStateChange(function(event, session) {
  if (event === 'PASSWORD_RECOVERY') {
    document.getElementById('request-form').style.display = 'none';
    document.getElementById('new-password-form').style.display = 'flex';
  }
});

document.getElementById('request-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var email = document.getElementById('reset-email').value;
  db.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://awakened-mind-academy-j5a2.vercel.app/reset-password.html'
  }).then(function(result) {
    if (result.error) showMessage(result.error.message, 'error');
    else showMessage('Reset link sent. Check your email inbox.', 'success');
  });
});

document.getElementById('new-password-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var newPass = document.getElementById('new-password').value;
  var confirmPass = document.getElementById('confirm-password').value;
  if (newPass !== confirmPass) {
    showMessage('Passwords do not match.', 'error');
    return;
  }
  db.auth.updateUser({ password: newPass }).then(function(result) {
    if (result.error) showMessage(result.error.message, 'error');
    else {
      showMessage('Password updated successfully. Redirecting to login...', 'success');
      setTimeout(function() { window.location.href = 'auth.html'; }, 2000);
    }
  });
});
