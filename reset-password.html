<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Awakened Mind Academy</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="auth-container">
  <div class="auth-box">

    <h2>Reset Password</h2>

    <div id="msg"></div>

    <!-- STEP 1 -->
    <form id="request-form">
      <input type="email" id="email" placeholder="Email" required />
      <button type="submit">Send Reset Link</button>
    </form>

    <!-- STEP 2 -->
    <form id="new-password-form" style="display:none;">
      <input type="password" id="pass1" placeholder="New password" required />
      <input type="password" id="pass2" placeholder="Confirm password" required />
      <button type="submit">Update Password</button>
    </form>

  </div>
</div>

<script>
const supabase = window.supabase.createClient(
  'https://ffpppcbegvjskeujlqif.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmcHBwY2JlZ3Zqc2tldWpscWlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODM3MTQsImV4cCI6MjA5Njc1OTcxNH0.FZu3uNtxJ8KeYx-c2d79YC3ThKzC98W4Azaxzsoot2A'
);

function msg(t, ok=false){
  const el = document.getElementById('msg');
  el.innerText = t;
  el.style.color = ok ? "green" : "red";
}

/* CRITICAL FIX: prevents page reload */
document.getElementById('request-form').addEventListener('submit', async (e)=>{
  e.preventDefault();

  const email = document.getElementById('email').value;

  const { error } = await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://awakened-mind-academy-j5a2.vercel.app/reset-password.html'
  });

  if(error){
    msg(error.message);
  } else {
    msg("Reset email sent. Check inbox.", true);
  }
});

/* Supabase recovery state handler */
supabase.auth.onAuthStateChange((event)=>{
  if(event === 'PASSWORD_RECOVERY'){
    document.getElementById('request-form').style.display = 'none';
    document.getElementById('new-password-form').style.display = 'block';
  }
});

/* password update */
document.getElementById('new-password-form').addEventListener('submit', async (e)=>{
  e.preventDefault();

  const p1 = document.getElementById('pass1').value;
  const p2 = document.getElementById('pass2').value;

  if(p1 !== p2){
    msg("Passwords do not match");
    return;
  }

  const { error } = await supabase.auth.updateUser({
    password: p1
  });

  if(error){
    msg(error.message);
  } else {
    msg("Password updated", true);
    setTimeout(()=>window.location.href='auth.html', 1500);
  }
});
</script>

</body>
</html>
