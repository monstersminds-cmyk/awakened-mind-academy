<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Profile — Awakened Mind Academy</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="images/AWAKENED_LOGO2.png">
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    .profile-container{min-height:100vh;padding:7rem 5% 4rem;max-width:700px;margin:0 auto}
    .profile-header{margin-bottom:2.5rem}
    .profile-avatar-section{display:flex;align-items:center;gap:1.5rem;margin-bottom:2.5rem;flex-wrap:wrap}
    .profile-avatar{width:100px;height:100px;border-radius:50%;border:2px solid var(--gold);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:2.5rem;font-weight:700;color:var(--gold);flex-shrink:0;overflow:hidden}
    .profile-avatar img{width:100%;height:100%;object-fit:cover}
    .avatar-upload label{display:inline-block;cursor:pointer;color:var(--gold);font-size:0.85rem;border:1px solid var(--gold);padding:0.4rem 1rem;border-radius:var(--radius);transition:background 0.2s}
    .avatar-upload label:hover{background:rgba(201,168,76,0.1)}
    .avatar-upload input{display:none}
    .avatar-upload p{font-size:0.75rem;color:var(--text-dim);margin-top:0.4rem}
    .profile-form{background:var(--bg2);border:1px solid rgba(201,168,76,0.12);border-radius:var(--radius);padding:2rem;display:flex;flex-direction:column;gap:1.2rem}
    .profile-message{padding:0.8rem 1rem;border-radius:var(--radius);font-size:0.85rem;display:none;margin-bottom:0.5rem}
    .profile-message.success{background:rgba(201,168,76,0.1);border:1px solid var(--gold);color:var(--gold)}
    .profile-message.error{background:rgba(255,80,80,0.1);border:1px solid #ff5050;color:#ff5050}
    .gate-box{background:var(--bg2);border:1px solid rgba(201,168,76,0.2);border-radius:var(--radius);padding:2.5rem;text-align:center}
    .gate-box h2{font-size:1.3rem;margin-bottom:0.5rem;color:var(--gold)}
    .gate-box p{color:var(--text-dim);font-size:0.9rem;margin-bottom:1.5rem}
    .gate-box .form-group{text-align:left;margin-bottom:1rem}
    .hidden{display:none}
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Awakened Mind Academy</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="profile.html" class="active">Profile</a>
    <button id="logout-btn" class="btn btn-outline" style="font-size:0.8rem;padding:0.5rem 1.2rem;">Logout</button>
  </div>
  <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
</nav>

<div class="profile-container">
  <div class="profile-header">
    <p class="section-eyebrow">Your Account</p>
    <h1 class="section-title">Update Profile</h1>
  </div>

  <!-- PASSWORD GATE -->
  <div id="gate-section">
    <div class="gate-box">
      <h2>Verify Your Identity</h2>
      <p>Enter your password to access and update your profile details.</p>
      <div id="gate-message" class="profile-message"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="gate-email" disabled style="opacity:0.6;cursor:not-allowed;width:100%;background:var(--bg);border:1px solid rgba(201,168,76,0.2);border-radius:var(--radius);padding:0.75rem 1rem;color:var(--text);font-family:Inter,sans-serif;font-size:0.9rem;">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="gate-password" placeholder="Enter your password" style="width:100%;background:var(--bg);border:1px solid rgba(201,168,76,0.2);border-radius:var(--radius);padding:0.75rem 1rem;color:var(--text);font-family:Inter,sans-serif;font-size:0.9rem;outline:none;">
      </div>
      <button id="gate-btn" class="btn btn-gold" style="width:100%;margin-top:0.5rem;">Verify & Edit Profile</button>
      <p style="margin-top:1rem;font-size:0.82rem;"><a href="dashboard.html" style="color:var(--gold);">← Back to Dashboard</a></p>
    </div>
  </div>

  <!-- PROFILE EDIT FORM (hidden until password verified) -->
  <div id="profile-section" class="hidden">
    <div class="profile-avatar-section">
      <div class="profile-avatar" id="avatar-display">?</div>
      <div class="avatar-upload">
        <label for="avatar-input">Upload Photo</label>
        <input type="file" id="avatar-input" accept="image/*">
        <p>Optional. JPG or PNG under 2MB.</p>
      </div>
    </div>

    <div class="profile-message" id="profile-message"></div>

    <form class="profile-form" id="profile-form">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="full-name" placeholder="Your full name" required>
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="e.g. wally254">
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" disabled style="opacity:0.6;cursor:not-allowed;">
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="+254 ...">
      </div>
      <div class="form-group">
        <label>About Me (optional)</label>
        <textarea id="about-me" placeholder="Tell Professor Kungu a little about yourself and your goals..." style="min-height:90px;"></textarea>
      </div>
      <button type="button" id="save-btn" class="btn btn-gold" style="width:100%;">Save Changes</button>
      <a href="dashboard.html" style="display:block;text-align:center;margin-top:0.5rem;font-size:0.85rem;color:var(--text-dim);">Cancel — Back to Dashboard</a>
    </form>
  </div>
</div>

<script>
var SUPA_URL = 'https://ffpppcbegvjskeujlqif.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmcHBwY2JlZ3Zqc2tldWpscWlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODM3MTQsImV4cCI6MjA5Njc1OTcxNH0.FZu3uNtxJ8KeYx-c2d79YC3ThKzC98W4Azaxzsoot2A';
var db = null;
var currentUser = null;

function showGateMessage(text, type) {
  var msg = document.getElementById('gate-message');
  msg.textContent = text;
  msg.className = 'profile-message ' + type;
  msg.style.display = 'block';
}

function showProfileMessage(text, type) {
  var msg = document.getElementById('profile-message');
  msg.textContent = text;
  msg.className = 'profile-message ' + type;
  msg.style.display = 'block';
  setTimeout(function() { msg.style.display = 'none'; }, 5000);
}

function initPage() {
  try {
    db = supabase.createClient(SUPA_URL, SUPA_KEY);
  } catch(e) {
    setTimeout(initPage, 500);
    return;
  }

  db.auth.getSession().then(function(result) {
    var session = result.data.session;
    if (!session) {
      window.location.href = 'auth.html';
      return;
    }
    currentUser = session.user;
    document.getElementById('gate-email').value = currentUser.email;
  });

  document.getElementById('gate-btn').addEventListener('click', function() {
    var password = document.getElementById('gate-password').value;
    if (!password) {
      showGateMessage('Please enter your password.', 'error');
      return;
    }
    var btn = document.getElementById('gate-btn');
    btn.textContent = 'Verifying...';
    btn.disabled = true;

    db.auth.signInWithPassword({
      email: currentUser.email,
      password: password
    }).then(function(result) {
      btn.textContent = 'Verify & Edit Profile';
      btn.disabled = false;
      if (result.error) {
        showGateMessage('Incorrect password. Please try again.', 'error');
        return;
      }
      document.getElementById('gate-section').classList.add('hidden');
      document.getElementById('profile-section').classList.remove('hidden');
      loadProfile();
    });
  });

  document.getElementById('gate-password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      document.getElementById('gate-btn').click();
    }
  });

  document.getElementById('logout-btn').addEventListener('click', function() {
    db.auth.signOut().then(function() {
      window.location.href = 'auth.html';
    });
  });

  document.getElementById('save-btn').addEventListener('click', function() {
    saveProfile();
  });

  document.getElementById('avatar-input').addEventListener('change', function(e) {
    if (e.target.files && e.target.files[0]) {
      uploadAvatar(e.target.files[0]);
    }
  });

  var hamburger = document.querySelector('.hamburger');
  var navLinks = document.querySelector('.nav-links');
  if (hamburger) {
    hamburger.addEventListener('click', function() {
      navLinks.classList.toggle('open');
    });
  }
}

function loadProfile() {
  document.getElementById('email').value = currentUser.email;
  db.from('profiles').select('*').eq('id', currentUser.id).single().then(function(result) {
    var data = result.data;
    if (data) {
      document.getElementById('full-name').value = data.full_name || '';
      document.getElementById('username').value = data.username || '';
      document.getElementById('phone').value = data.phone || '';
      document.getElementById('about-me').value = data.about_me || '';
      if (data.avatar_url) {
        document.getElementById('avatar-display').innerHTML = '<img src="' + data.avatar_url + '" alt="Avatar">';
      } else {
        document.getElementById('avatar-display').textContent = (data.full_name || currentUser.email).charAt(0).toUpperCase();
      }
    } else {
      var meta = currentUser.user_metadata;
      if (meta && meta.full_name) {
        document.getElementById('full-name').value = meta.full_name;
        document.getElementById('avatar-display').textContent = meta.full_name.charAt(0).toUpperCase();
      } else {
        document.getElementById('avatar-display').textContent = currentUser.email.charAt(0).toUpperCase();
      }
    }
  });
}

function saveProfile() {
  if (!currentUser) return;
  db.from('profiles').upsert({
    id: currentUser.id,
    full_name: document.getElementById('full-name').value,
    username: document.getElementById('username').value,
    phone: document.getElementById('phone').value,
    about_me: document.getElementById('about-me').value,
    updated_at: new Date().toISOString()
  }).then(function(result) {
    if (result.error) {
      showProfileMessage('Error saving: ' + result.error.message, 'error');
    } else {
      showProfileMessage('Profile updated successfully.', 'success');
      setTimeout(function() {
        window.location.href = 'dashboard.html';
      }, 2000);
    }
  });
}

function uploadAvatar(file) {
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) {
    showProfileMessage('Image must be under 2MB.', 'error');
    return;
  }
  var path = 'avatars/' + currentUser.id;
  db.storage.from('profiles').upload(path, file, { upsert: true }).then(function(result) {
    if (result.error) {
      showProfileMessage('Upload failed: ' + result.error.message, 'error');
      return;
    }
    var urlResult = db.storage.from('profiles').getPublicUrl(path);
    var publicUrl = urlResult.data.publicUrl;
    db.from('profiles').upsert({
      id: currentUser.id,
      avatar_url: publicUrl,
      updated_at: new Date().toISOString()
    }).then(function() {
      document.getElementById('avatar-display').innerHTML = '<img src="' + publicUrl + '" alt="Avatar">';
      showProfileMessage('Photo updated successfully.', 'success');
    });
  });
}

window.addEventListener('load', function() {
  var attempts = 0;
  var interval = setInterval(function() {
    attempts++;
    if (typeof supabase !== 'undefined') {
      clearInterval(interval);
      initPage();
    }
    if (attempts > 20) {
      clearInterval(interval);
      document.getElementById('gate-section').innerHTML = '<p style="color:var(--text-dim);text-align:center;">Failed to load. Please <a href="profile.html" style="color:var(--gold);">refresh the page</a>.</p>';
    }
  }, 300);
});
