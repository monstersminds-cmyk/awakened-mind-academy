<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — Awakened Mind Academy</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="images/AWAKENED_LOGO2.png">
  <style>
    .profile-container{min-height:100vh;padding:7rem 5% 4rem;max-width:700px;margin:0 auto}
    .profile-header{margin-bottom:2.5rem}
    .profile-avatar-section{display:flex;align-items:center;gap:1.5rem;margin-bottom:2.5rem;flex-wrap:wrap}
    .profile-avatar{width:100px;height:100px;border-radius:50%;border:2px solid var(--gold);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:2.5rem;font-weight:700;color:var(--gold);flex-shrink:0;overflow:hidden}
    .profile-avatar img{width:100%;height:100%;object-fit:cover}
    .avatar-upload label{display:inline-block;cursor:pointer;color:var(--gold);font-size:0.85rem;border:1px solid var(--gold);padding:0.4rem 1rem;border-radius:var(--radius);transition:background 0.2s}
    .avatar-upload label:hover{background:rgba(201,168,76,0.1)}
    .avatar-upload input{display:none}
    .avatar-upload p{font-size:0.75rem;color:var(--text-dim);margin-top:0.4rem}
    .profile-form{background:var(--bg2);border:1px solid rgba(201,168,76,0.12);border-radius:var(--radius);padding:2rem;display:flex;flex-direction:column;gap:1.2rem}
    .profile-message{padding:0.8rem 1rem;border-radius:var(--radius);font-size:0.85rem;display:none;margin-bottom:0.5rem}
    .profile-message.success{background:rgba(201,168,76,0.1);border:1px solid var(--gold);color:var(--gold)}
    .profile-message.error{background:rgba(255,80,80,0.1);border:1px solid #ff5050;color:#ff5050}
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Awakened Mind Academy</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="profile.html" class="active">Profile</a>
    <button onclick="logoutUser()" class="btn btn-outline" style="font-size:0.8rem;padding:0.5rem 1.2rem;">Logout</button>
  </div>
  <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
</nav>

<div class="profile-container">
  <div class="profile-header">
    <p class="section-eyebrow">Your Account</p>
    <h1 class="section-title">My Profile</h1>
  </div>

  <div class="profile-avatar-section">
    <div class="profile-avatar" id="avatar-display">?</div>
    <div class="avatar-upload">
      <label for="avatar-input">Upload Photo</label>
      <input type="file" id="avatar-input" accept="image/*">
      <p>Optional. JPG or PNG under 2MB.</p>
    </div>
  </div>

  <div class="profile-message" id="profile-message"></div>

  <form class="profile-form" id="profile-form">
    <div class="form-row">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="full-name" placeholder="Your full name" required>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="e.g. wally254">
      </div>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="your@email.com" disabled style="opacity:0.6;cursor:not-allowed;">
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="+254 ...">
    </div>
    <div class="form-group">
      <label>About Me (optional)</label>
      <textarea id="about-me" placeholder="Tell Professor Kungu a little about yourself and your goals..." style="min-height:90px;"></textarea>
    </div>
    <button type="submit" class="btn btn-gold" style="width:100%;">Save Profile</button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
window.addEventListener('load', function(){
  const _supabase = window.supabase.createClient(
    'https://ffpppcbegvjskeujlqif.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmcHBwY2JlZ3Zqc2tldWpscWlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODM3MTQsImV4cCI6MjA5Njc1OTcxNH0.FZu3uNtxJ8KeYx-c2d79YC3ThKzC98W4Azaxzsoot2A'
  );

  function showMessage(text, type){
    const msg = document.getElementById('profile-message');
    msg.textContent = text;
    msg.className = 'profile-message ' + type;
    msg.style.display = 'block';
    setTimeout(()=>{ msg.style.display='none'; }, 4000);
  }

  async function logoutUser(){
    await _supabase.auth.signOut();
    window.location.href = 'auth.html';
  }
  window.logoutUser = logoutUser;

  async function loadProfile(){
    const {data:{session}} = await _supabase.auth.getSession();
    if(!session){ window.location.href='auth.html'; return; }
    const user = session.user;
    document.getElementById('email').value = user.email;
    const {data} = await _supabase.from('profiles').select('*').eq('id', user.id).single();
    if(data){
      document.getElementById('full-name').value = data.full_name || '';
      document.getElementById('username').value = data.username || '';
      document.getElementById('phone').value = data.phone || '';
      document.getElementById('about-me').value = data.about_me || '';
      if(data.avatar_url){
        document.getElementById('avatar-display').innerHTML = '<img src="'+data.avatar_url+'" alt="Avatar">';
      } else {
        document.getElementById('avatar-display').textContent = (data.full_name || user.email).charAt(0).toUpperCase();
      }
    } else {
      const meta = user.user_metadata;
      document.getElementById('full-name').value = meta && meta.full_name ? meta.full_name : '';
      document.getElementById('avatar-display').textContent = (meta && meta.full_name ? meta.full_name : user.email).charAt(0).toUpperCase();
    }
  }

  document.getElementById('avatar-input').addEventListener('change', async function(e){
    const file = e.target.files[0];
    if(!file) return;
    if(file.size > 2*1024*1024){ showMessage('Image must be under 3MB.','error'); return; }
    const {data:{session}} = await _supabase.auth.getSession();
    const path = 'avatars/' + session.user.id;
    const {error} = await _supabase.storage.from('profiles').upload(path, file, {upsert:true});
    if(error){ showMessage('Photo upload failed: '+error.message,'error'); return; }
    const {data} = _supabase.storage.from('profiles').getPublicUrl(path);
    await _supabase.from('profiles').upsert({id:session.user.id, avatar_url:data.publicUrl});
    document.getElementById('avatar-display').innerHTML = '<img src="'+data.publicUrl+'" alt="Avatar">';
    showMessage('Photo updated successfully.','success');
  });

  document.getElementById('profile-form').addEventListener('submit', async function(e){
    e.preventDefault();
    const {data:{session}} = await _supabase.auth.getSession();
    if(!session){ window.location.href='auth.html'; return; }
    const {error} = await _supabase.from('profiles').upsert({
      id: session.user.id,
      full_name: document.getElementById('full-name').value,
      username: document.getElementById('username').value,
      phone: document.getElementById('phone').value,
      about_me: document.getElementById('about-me').value,
      updated_at: new Date()
    });
    if(error){ showMessage('Error saving: '+error.message,'error'); }
    else{
  showMessage('Profile saved successfully.','success');
  setTimeout(()=>{ window.location.href='dashboard.html'; }, 1500);
}
  });

  const hamburger = document.querySelector('.hamburger');
  const navLinks = document.querySelector('.nav-links');
  if(hamburger){
    hamburger.addEventListener('click', function(){ navLinks.classList.toggle('open'); });
    document.addEventListener('click', function(e){
      if(!hamburger.contains(e.target) && !navLinks.contains(e.target)){
        navLinks.classList.remove('open');
      }
    });
  }

  loadProfile();
});
