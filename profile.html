<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — Awakened Mind Academy</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="images/AWAKENED_LOGO2.png">
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    .profile-container{min-height:100vh;padding:7rem 5% 4rem;max-width:700px;margin:0 auto}
    .profile-header{margin-bottom:2.5rem}
    .profile-avatar-section{display:flex;align-items:center;gap:1.5rem;margin-bottom:2.5rem;flex-wrap:wrap}
    .profile-avatar{width:100px;height:100px;border-radius:50%;border:2px solid var(--gold);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:2.5rem;font-weight:700;color:var(--gold);flex-shrink:0;overflow:hidden}
    .profile-avatar img{width:100%;height:100%;object-fit:cover}
    .avatar-upload label{display:inline-block;cursor:pointer;color:var(--gold);font-size:0.85rem;border:1px solid var(--gold);padding:0.4rem 1rem;border-radius:var(--radius);transition:background 0.2s}
    .avatar-upload label:hover{background:rgba(201,168,76,0.1)}
    .avatar-upload input{display:none}
    .avatar-upload p{font-size:0.75rem;color:var(--text-dim);margin-top:0.4rem}
    .profile-form{background:var(--bg2);border:1px solid rgba(201,168,76,0.12);border-radius:var(--radius);padding:2rem;display:flex;flex-direction:column;gap:1.2rem}
    .profile-message{padding:0.8rem 1rem;border-radius:var(--radius);font-size:0.85rem;display:none;margin-bottom:0.5rem}
    .profile-message.success{background:rgba(201,168,76,0.1);border:1px solid var(--gold);color:var(--gold)}
    .profile-message.error{background:rgba(255,80,80,0.1);border:1px solid #ff5050;color:#ff5050}
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Awakened Mind Academy</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="profile.html" class="active">Profile</a>
    <button id="logout-btn" class="btn btn-outline" style="font-size:0.8rem;padding:0.5rem 1.2rem;">Logout</button>
  </div>
  <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
</nav>

<div class="profile-container">
  <div class="profile-header">
    <p class="section-eyebrow">Your Account</p>
    <h1 class="section-title">My Profile</h1>
  </div>

  <div class="profile-avatar-section">
    <div class="profile-avatar" id="avatar-display">?</div>
    <div class="avatar-upload">
      <label for="avatar-input">Upload Photo</label>
      <input type="file" id="avatar-input" accept="image/*">
      <p>Optional. JPG or PNG under 2MB.</p>
    </div>
  </div>

  <div class="profile-message" id="profile-message"></div>

  <form class="profile-form" id="profile-form">
    <div class="form-row">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="full-name" placeholder="Your full name" required>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="e.g. wally254">
      </div>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" disabled style="opacity:0.6;cursor:not-allowed;">
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="+254 ...">
    </div>
    <div class="form-group">
      <label>About Me (optional)</label>
      <textarea id="about-me" placeholder="Tell Professor Kungu a little about yourself and your goals..." style="min-height:90px;"></textarea>
    </div>
    <button type="button" id="save-btn" class="btn btn-gold" style="width:100%;">Save Profile</button>
  </form>
</div>

<script>
var SUPA_URL = 'https://ffpppcbegvjskeujlqif.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmcHBwY2JlZ3Zqc2tldWpscWlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODM3MTQsImV4cCI6MjA5Njc1OTcxNH0.FZu3uNtxJ8KeYx-c2d79YC3ThKzC98W4Azaxzsoot2A';
var db = null;
var currentUser = null;

function showMessage(text, type) {
  var msg = document.getElementById('profile-message');
  msg.textContent = text;
  msg.className = 'profile-message ' + type;
  msg.style.display = 'block';
  setTimeout(function() { msg.style.display = 'none'; }, 5000);
}

function initApp() {
  try {
    db = supabase.createClient(SUPA_URL, SUPA_KEY);
  } catch(e) {
    setTimeout(initApp, 500);
    return;
  }

  db.auth.getSession().then(function(result) {
    var session = result.data.session;
    if (!session) {
      window.location.href = 'auth.html';
      return;
    }
    currentUser = session.user;
    document.getElementById('email').value = currentUser.email;
    loadProfile();
  });

  document.getElementById('logout-btn').addEventListener('click', function() {
    db.auth.signOut().then(function() {
      window.location.href = 'auth.html';
    });
  });

  document.getElementById('save-btn').addEventListener('click', function() {
    saveProfile();
  });

  document.getElementById('avatar-input').addEventListener('change', function(e) {
    if (e.target.files && e.target.files[0]) {
      uploadAvatar(e.target.files[0]);
    }
  });

  var hamburger = document.querySelector('.hamburger');
  var navLinks = document.querySelector('.nav-links');
  if (hamburger) {
    hamburger.addEventListener('click', function() {
      navLinks.classList.toggle('open');
    });
  }
}

function loadProfile() {
  db.from('profiles').select('*').eq('id', currentUser.id).single().then(function(result) {
    var data = result.data;
    if (data) {
      document.getElementById('full-name').value = data.full_name || '';
      document.getElementById('username').value = data.username || '';
      document.getElementById('phone').value = data.phone || '';
      document.getElementById('about-me').value = data.about_me || '';
      if (data.avatar_url) {
        document.getElementById('avatar-display').innerHTML = '<img src="' + data.avatar_url + '" alt="Avatar">';
      } else {
        var initial = (data.full_name || currentUser.email).charAt(0).toUpperCase();
        document.getElementById('avatar-display').textContent = initial;
      }
    } else {
      var meta = currentUser.user_metadata;
      if (meta && meta.full_name) {
        document.getElementById('full-name').value = meta.full_name;
        document.getElementById('avatar-display').textContent = meta.full_name.charAt(0).toUpperCase();
      } else {
        document.getElementById('avatar-display').textContent = currentUser.email.charAt(0).toUpperCase();
      }
    }
  });
}

function saveProfile() {
  if (!currentUser) return;
  var fullName = document.getElementById('full-name').value;
  var username = document.getElementById('username').value;
  var phone = document.getElementById('phone').value;
  var aboutMe = document.getElementById('about-me').value;

  db.from('profiles').upsert({
    id: currentUser.id,
    full_name: fullName,
    username: username,
    phone: phone,
    about_me: aboutMe,
    updated_at: new Date().toISOString()
  }).then(function(result) {
    if (result.error) {
      showMessage('Error saving: ' + result.error.message, 'error');
    } else {
      showMessage('Profile saved successfully.', 'success');
      setTimeout(function() {
        window.location.href = 'dashboard.html';
      }, 2000);
    }
  });
}

function uploadAvatar(file) {
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) {
    showMessage('Image must be under 2MB.', 'error');
    return;
  }
  var path = 'avatars/' + currentUser.id;
  db.storage.from('profiles').upload(path, file, { upsert: true }).then(function(result) {
    if (result.error) {
      showMessage('Upload failed: ' + result.error.message, 'error');
      return;
    }
    var urlResult = db.storage.from('profiles').getPublicUrl(path);
    var publicUrl = urlResult.data.publicUrl;
    db.from('profiles').upsert({
      id: currentUser.id,
      avatar_url: publicUrl,
      updated_at: new Date().toISOString()
    }).then(function() {
      document.getElementById('avatar-display').innerHTML = '<img src="' + publicUrl + '" alt="Avatar">';
      showMessage('Photo updated successfully.', 'success');
    });
  });
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initApp);
} else {
  initApp();
}
</script>
</body>
</html>
